<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DinoDate - Prehistoric Love</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden max-w-md mx-auto shadow-2xl relative border-x border-gray-300">

    <!-- Header -->
    <header class="bg-white p-4 shadow z-10 flex justify-between items-center">
        <div class="text-pink-500 font-bold text-2xl flex items-center gap-2">
            <i class="fas fa-fire"></i> DinoDate
        </div>
        <button onclick="location.reload()" class="text-gray-400 hover:text-pink-500"><i class="fas fa-redo"></i></button>
    </header>

    <!-- Main Container -->
    <main class="flex-1 relative w-full h-full overflow-hidden bg-white">
        
        <!-- SWIPE SCREEN -->
        <div id="swipe-screen" class="absolute inset-0 flex flex-col items-center justify-center p-4">
            <div id="card-container" class="relative w-full h-[70vh] rounded-2xl shadow-xl bg-gray-200">
                <!-- Cards injected by JS -->
                <div id="placeholder-msg" class="hidden flex items-center justify-center h-full text-gray-500 font-bold">
                    No more dinos nearby...
                </div>
            </div>

            <!-- Controls -->
            <div class="flex gap-8 mt-6 z-10">
                <button id="btn-nope" class="w-16 h-16 rounded-full bg-white text-red-500 shadow-lg text-3xl border border-gray-200 hover:scale-110 transition flex items-center justify-center"><i class="fas fa-times"></i></button>
                <button id="btn-like" class="w-16 h-16 rounded-full bg-white text-green-500 shadow-lg text-3xl border border-gray-200 hover:scale-110 transition flex items-center justify-center"><i class="fas fa-heart"></i></button>
            </div>
        </div>

        <!-- MATCH OVERLAY -->
        <div id="match-overlay" class="hidden absolute inset-0 z-50 bg-black/80 flex flex-col items-center justify-center text-white text-center p-6 backdrop-blur-sm">
            <h1 class="text-6xl font-black text-green-400 italic mb-4 animate-bounce" style="text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);">MATCH!</h1>
            <p class="text-xl mb-8">You and <span id="match-name" class="font-bold text-pink-400">Dino</span> fancy each other.</p>
            <div class="flex flex-col gap-4 w-full max-w-xs">
                <button id="btn-start-chat" class="bg-pink-500 text-white px-8 py-3 rounded-full font-bold hover:bg-pink-600 shadow-lg transform transition hover:scale-105">Send Message</button>
                <button onclick="location.reload()" class="border border-white px-8 py-3 rounded-full font-bold hover:bg-white hover:text-black transition">Keep Swiping</button>
            </div>
        </div>

        <!-- CHAT SCREEN -->
        <div id="chat-screen" class="hidden absolute inset-0 bg-white flex flex-col z-20">
            <!-- Chat Header -->
            <div class="bg-white p-3 border-b flex items-center gap-3 shadow-sm">
                <button id="btn-back" class="text-gray-500 hover:bg-gray-100 p-2 rounded-full"><i class="fas fa-chevron-left"></i></button>
                <img id="chat-avatar" src="" class="w-10 h-10 rounded-full object-cover bg-gray-300 border border-gray-200">
                <div>
                    <h3 id="chat-name" class="font-bold text-gray-800 leading-tight">Dino</h3>
                    <span class="text-xs text-green-500 font-medium">● Online (Hungry)</span>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50 scroll-smooth">
                <!-- Messages injected here -->
            </div>

            <!-- Input Area -->
            <div class="p-3 bg-white border-t flex gap-2 items-center">
                <input type="text" id="chat-input" placeholder="Say something nice..." class="flex-1 bg-gray-100 rounded-full px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-300 transition">
                <button id="btn-send" class="bg-pink-500 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-pink-600 shadow-md transition disabled:opacity-50"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
